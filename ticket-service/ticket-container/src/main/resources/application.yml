server:
  port: 8183

logging:
  level:
    com.ticket.ordering.system: DEBUG

ticket-service:
  ticket-reservation-request-topic-name: ticket-reservation-request
  ticket-reservation-response-topic-name: ticket-reservation-response
  ticket-approval-request-topic-name: ticket-approval-request
  ticket-approval-response-topic-name: ticket-approval-response

spring:
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=ticket&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      platform: postgres
      schema-locations: classpath:init-schema.sql
      data-locations: classpath:init-data.sql

kafka-config:
  bootstrap-servers: ${KAFKA_CONFIG_BOOTSTRAP_SERVERS:localhost:19092,localhost:29092,localhost:39092}
  num-of-partitions: ${KAFKA_CONFIG_NUM_OF_PARTITIONS:3}
  replication-factor: ${KAFKA_CONFIG_REPLICATION_FACTOR:3}
  topic-names:
    - payment-request
    - payment-response
    - ticket-reservation-request
    - ticket-reservation-response
    - ticket-approval-request
    - ticket-approval-response

kafka-producer-config:
  key-serializer-class: org.apache.kafka.common.serialization.StringSerializer
  value-serializer-class: org.springframework.kafka.support.serializer.JsonSerializer
  compression-type: none
  acks: all
  batch-size: 16384
  batch-size-boost-factor: 100
  linger-ms: 5
  request-timeout-ms: 60000
  retry-count: 5
  add-type-info-headers: true

kafka-consumer-config:
  key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  consumer-group-id: ticket-ordering-system-consumer
  ticket-reservation-request-consumer-group-id: ticket-reservation-request-topic-consumer
  ticket-approval-request-consumer-group-id: ticket-approval-request-topic-consumer
  auto-offset-reset: earliest
  batch-listener: true
  auto-startup: true
  concurrency-level: 3
  session-timeout-ms: 10000
  heartbeat-interval-ms: 3000
  max-poll-interval-ms: 300000
  poll-timeout-ms: 150
  max-poll-records: 500
  max-partition-fetch-bytes-default: 1048576
  max-partition-fetch-bytes-boost-factor: 1
  trusted-packages: com.ticket.ordering.system.kafka.order.avro.model
  use-type-headers: true
